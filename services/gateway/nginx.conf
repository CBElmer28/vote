worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    sendfile        on;
    keepalive_timeout  65;

    # Aumentar el tamaño máximo permitido para uploads (fotos)
    client_max_body_size 20M;

    # Configuración de logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name localhost;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:80;" always;

        # Cabeceras comunes para Proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fail-Fast Timeouts
        proxy_connect_timeout 2s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;

        # MS Usuarios
        location /api/usuarios {
            proxy_pass http://ms_usuarios:5001;
        }

        # MS Biométrico
        location /api/biometrico {
            proxy_pass http://ms_biometrico:5002;
        }

        # MS Votación
        location /api/votacion {
            proxy_pass http://ms_votacion:5003;
        }

        # MS Análisis
        location /api/analisis {
            proxy_pass http://ms_analisis:5004;
        }

        # MS Candidatos
        location /api/candidatos {
            proxy_pass http://ms_candidatos:5005;
        }

        # Root endpoint para salud del gateway
        location / {
            return 200 '{"estado": "El Gateway está funcionando", "version": "1.0.0"}';
        }

        # Manejo de errores
        error_page 404 /404.json;
        location = /404.json {
            return 404 '{"error": "No Encontrado", "mensaje": "El recurso solicitado no se encuentra en este gateway."}';
        }

        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            return 502 '{"error": "Puerta de Enlace Incorrecta", "mensaje": "Uno de los microservicios está caído o no es accesible."}';
        }
    }
}
