apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-candidatos
  namespace: default
  labels:
    app: ms-candidatos
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ms-candidatos
  template:
    metadata:
      labels:
        app: ms-candidatos
    spec:
      containers:
        - name: ms-candidatos
          image: votesystem-ms-candidatos:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5005
              name: http
          env:
            - name: FLASK_ENV
              value: development
            - name: FLASK_DEBUG
              value: "0"
            - name: DB_HOST
              value: votesystem-db
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: votesystem
            - name: DB_USER
              value: voteuser
            - name: DB_PASSWORD
              value: votepassword
            - name: SECRET_KEY
              value: dev-secret-candidatos
          livenessProbe:
            httpGet:
              path: /api/candidatos/health
              port: 5005
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/candidatos/health
              port: 5005
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ms-candidatos
  namespace: default
spec:
  ports:
    - port: 5005
      targetPort: 5005
      protocol: TCP
  selector:
    app: ms-candidatos
