apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-usuarios
  namespace: default
  labels:
    app: ms-usuarios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-usuarios
  template:
    metadata:
      labels:
        app: ms-usuarios
    spec:
      containers:
        - name: ms-usuarios
          image: votesystem-ms-usuarios:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: FLASK_ENV
              value: development
            - name: FLASK_DEBUG
              value: "1"
            - name: DB_HOST
              value: votesystem-db
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: votesystem
            - name: DB_USER
              value: voteuser
            - name: DB_PASSWORD
              value: votepassword
            - name: SECRET_KEY
              value: dev-secret-usuarios
          livenessProbe:
            httpGet:
              path: /api/usuarios/health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/usuarios/health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ms-usuarios
  namespace: default
spec:
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
  selector:
    app: ms-usuarios
