# helm-values.yaml
# Valores personalizados para la instalación de kube-prometheus-stack

prometheus:
  prometheusSpec:
    # Permitir que Prometheus descubra ServiceMonitors y PodMonitors
    # sin necesidad de que coincida la etiqueta del release de Helm.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

grafana:
  # Habilitar el acceso a través del subpath /grafana/ en el Gateway Nginx
  grafana.ini:
    server:
      domain: localhost
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      serve_from_sub_path: true
  
  # Credenciales por defecto para iniciar sesión
  adminPassword: admin
