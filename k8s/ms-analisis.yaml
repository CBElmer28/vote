apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-analisis
  namespace: default
  labels:
    app: ms-analisis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-analisis
  template:
    metadata:
      labels:
        app: ms-analisis
    spec:
      containers:
        - name: ms-analisis
          image: votesystem-ms-analisis:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5004
              name: http
          env:
            - name: FLASK_ENV
              value: development
            - name: FLASK_DEBUG
              value: "1"
            - name: DB_HOST
              value: votesystem-db
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: votesystem
            - name: DB_USER
              value: voteuser
            - name: DB_PASSWORD
              value: votepassword
            - name: SECRET_KEY
              value: dev-secret-analisis
          livenessProbe:
            httpGet:
              path: /api/analisis/health
              port: 5004
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/analisis/health
              port: 5004
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ms-analisis
  namespace: default
  labels:
    app: ms-analisis
spec:
  ports:
    - name: http
      port: 5004
      targetPort: 5004
      protocol: TCP
  selector:
    app: ms-analisis
