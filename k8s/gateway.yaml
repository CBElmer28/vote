apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: default
data:
  nginx.conf: |
    worker_processes 1;

    events {
        worker_connections 1024;
    }

    http {
        include       mime.types;
        default_type  application/json;

        sendfile        on;
        keepalive_timeout  65;

        client_max_body_size 20M;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        server {
            listen 80;
            server_name localhost;

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:80;" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 15s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;

            # MS Usuarios
            location /api/usuarios {
                proxy_pass http://ms-usuarios:5001;
            }

            # MS Biométrico
            location /api/biometrico {
                proxy_pass http://ms-biometrico:5002;
            }

            # MS Votación
            location /api/votacion {
                proxy_pass http://ms-votacion:5003;
            }

            # MS Análisis
            location /api/analisis {
                proxy_pass http://ms-analisis:5004;
            }

            # MS Candidatos
            location /api/candidatos {
                proxy_pass http://ms-candidatos:5005;
            }

            # Root endpoint para salud del gateway
            location / {
                return 200 '{"estado": "El Gateway está funcionando en Kubernetes", "version": "1.0.0"}';
            }

            error_page 404 /404.json;
            location = /404.json {
                return 404 '{"error": "No Encontrado", "mensaje": "El recurso solicitado no se encuentra en este gateway."}';
            }

            error_page 500 502 503 504 /50x.json;
            location = /50x.json {
                return 502 '{"error": "Puerta de Enlace Incorrecta", "mensaje": "Uno de los microservicios está caído o no es accesible."}';
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: default
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: votesystem-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config-vol
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config-vol
          configMap:
            name: gateway-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: gateway
