apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-biometrico
  namespace: default
  labels:
    app: ms-biometrico
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-biometrico
  template:
    metadata:
      labels:
        app: ms-biometrico
    spec:
      containers:
        - name: ms-biometrico
          image: votesystem-ms-biometrico:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
              name: http
          env:
            - name: FLASK_ENV
              value: development
            - name: FLASK_DEBUG
              value: "0"
            - name: BIOMETRIC_MODE
              value: "aws"
            - name: AZURE_FACE_API_KEY
              value: YOUR_KEY_HERE
            - name: AZURE_FACE_ENDPOINT
              value: https://YOUR_RESOURCE.cognitiveservices.azure.com/
            - name: FACE_CONFIDENCE_THRESHOLD
              value: "0.6"
            - name: AZURE_FP_ENDPOINT
              value: https://YOUR_RESOURCE.cognitiveservices.azure.com/
            - name: FP_CONFIDENCE_THRESHOLD
              value: "0.7"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-secrets
                  key: aws-secret-access-key
            - name: AWS_REGION
              value: us-east-1
            - name: SECRET_KEY
              value: dev-secret-biometrico
          livenessProbe:
            httpGet:
              path: /api/biometrico/health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/biometrico/health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ms-biometrico
  namespace: default
  labels:
    app: ms-biometrico
spec:
  ports:
    - name: http
      port: 5002
      targetPort: 5002
      protocol: TCP
  selector:
    app: ms-biometrico
