apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-votacion
  namespace: default
  labels:
    app: ms-votacion
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ms-votacion
  template:
    metadata:
      labels:
        app: ms-votacion
    spec:
      containers:
        - name: ms-votacion
          image: votesystem-ms-votacion:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
              name: http
          env:
            - name: FLASK_ENV
              value: development
            - name: FLASK_DEBUG
              value: "0"
            - name: DB_HOST
              value: votesystem-db
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: votesystem
            - name: DB_USER
              value: voteuser
            - name: DB_PASSWORD
              value: votepassword
            - name: SECRET_KEY
              value: dev-secret-usuarios
            - name: BIOMETRICO_URL
              value: http://ms-biometrico:5002
          livenessProbe:
            httpGet:
              path: /api/votacion/health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/votacion/health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ms-votacion
  namespace: default
  labels:
    app: ms-votacion
spec:
  ports:
    - name: http
      port: 5003
      targetPort: 5003
      protocol: TCP
  selector:
    app: ms-votacion
