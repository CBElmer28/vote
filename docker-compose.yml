version: "3.9"

# ============================================================
#  VOTESYSTEM — Docker Compose
#  Fase 1: Infraestructura base
#
#  Puertos locales:
#    MySQL           → 3307  (3306 ocupado por MySQL local de Windows)
#    MS1 Usuarios    → 5001
#    MS2 Biométrico  → 5002
#    MS3 Votación    → 5003
#    MS4 Análisis    → 5004
#    MS5 Candidatos  → 5005
# ============================================================

services:

  # ----------------------------------------------------------
  # GATEWAY — Nginx Proxy  (puerto 80)
  # ----------------------------------------------------------
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: votesystem_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ms_usuarios
      - ms_biometrico
      - ms_votacion
      - ms_analisis
      - ms_candidatos
    networks:
      - votenet


  # ----------------------------------------------------------
  # BASE DE DATOS — MySQL 8
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: votesystem_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-votesystem}
      MYSQL_USER: ${MYSQL_USER:-voteuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-votepassword}
    ports:
      - "3307:3306"   # 3307 externo → evita conflicto con MySQL local de Windows
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d   # scripts SQL de inicialización
    networks:
      - votenet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # MICROSERVICIO 1 — Gestión de Usuarios  (puerto 5001)
  # ----------------------------------------------------------
  ms_usuarios:
    build:
      context: ./services/ms_usuarios
      dockerfile: Dockerfile
    container_name: votesystem_ms_usuarios
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-votesystem}
      DB_USER: ${MYSQL_USER:-voteuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-votepassword}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-usuarios}
    volumes:
      - ./services/ms_usuarios:/app   # hot-reload en desarrollo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - votenet

  # ----------------------------------------------------------
  # MICROSERVICIO 2 — Validación Biométrica  (puerto 5002)
  # ----------------------------------------------------------
  ms_biometrico:
    build:
      context: ./services/ms_biometrico
      dockerfile: Dockerfile
    container_name: votesystem_ms_biometrico
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      BIOMETRIC_MODE: ${BIOMETRIC_MODE:-mock}
      AZURE_FACE_API_KEY: ${AZURE_FACE_API_KEY:-YOUR_KEY_HERE}
      AZURE_FACE_ENDPOINT: ${AZURE_FACE_ENDPOINT:-https://YOUR_RESOURCE.cognitiveservices.azure.com/}
      FACE_CONFIDENCE_THRESHOLD: ${FACE_CONFIDENCE_THRESHOLD:-0.6}
      AZURE_FP_ENDPOINT: ${AZURE_FP_ENDPOINT:-https://YOUR_RESOURCE.cognitiveservices.azure.com/}
      FP_CONFIDENCE_THRESHOLD: ${FP_CONFIDENCE_THRESHOLD:-0.7}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-biometrico}
    volumes:
      - ./services/ms_biometrico:/app
    networks:
      - votenet

  # ----------------------------------------------------------
  # MICROSERVICIO 3 — Votación  (puerto 5003)
  # ----------------------------------------------------------
  ms_votacion:
    build:
      context: ./services/ms_votacion
      dockerfile: Dockerfile
    container_name: votesystem_ms_votacion
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-votesystem}
      DB_USER: ${MYSQL_USER:-voteuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-votepassword}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-votacion}
      # URL interna al MS de validación biométrica
      BIOMETRICO_URL: http://ms_biometrico:5002
    volumes:
      - ./services/ms_votacion:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - votenet

  # ----------------------------------------------------------
  # MICROSERVICIO 4 — Análisis de Datos  (puerto 5004)
  # ----------------------------------------------------------
  ms_analisis:
    build:
      context: ./services/ms_analisis
      dockerfile: Dockerfile
    container_name: votesystem_ms_analisis
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-votesystem}
      DB_USER: ${MYSQL_USER:-voteuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-votepassword}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-analisis}
    volumes:
      - ./services/ms_analisis:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - votenet

  # ----------------------------------------------------------
  # MICROSERVICIO 5 — Candidatos  (puerto 5005)
  # ----------------------------------------------------------
  ms_candidatos:
    build:
      context: ./services/ms_candidatos
      dockerfile: Dockerfile
    container_name: votesystem_ms_candidatos
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-votesystem}
      DB_USER: ${MYSQL_USER:-voteuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-votepassword}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-candidatos}
    volumes:
      - ./services/ms_candidatos:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - votenet

  # ----------------------------------------------------------
  # n8n DATABASE — PostgreSQL 15 (puerto 5432 interno)
  # ----------------------------------------------------------
  n8n_db:
    image: postgres:15-alpine
    container_name: n8n_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n_database
      POSTGRES_USER: n8n_admin
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8nsecurepassword}
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    networks:
      - votenet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_admin -d n8n_database"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # n8n SERVER — Workflow automation (puerto 5678)
  # ----------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_server
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n_db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_database
      - DB_POSTGRESDB_USER=n8n_admin
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8nsecurepassword}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=America/Lima
      - TZ=America/Lima
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - votenet
    depends_on:
      n8n_db:
        condition: service_healthy

# ============================================================
#  VOLÚMENES
# ============================================================
volumes:
  db_data:
    driver: local
  n8n_db_data:
    driver: local
  n8n_data:
    driver: local

# ============================================================
#  REDES
# ============================================================
networks:
  votenet:
    driver: bridge
