name: Full-Stack CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Full-Stack Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose up -d
          echo "Waiting 15 seconds for services and database to initialize..."
          sleep 15

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies & Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Orchestrated Full-Stack Tests
        run: |
          # Create an empty .env file to prevent warning outputs if not checked in
          touch .env
          python run_tests_and_report.py

      - name: Send Test Report to n8n Webhook
        if: always()
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        run: |
          if [ -z "$N8N_WEBHOOK_URL" ]; then
            echo "Warning: N8N_WEBHOOK_URL secret is not set. Skipping report upload."
          else
            echo "Sending full-stack test report to n8n..."
            curl -X POST -H "Content-Type: multipart/form-data" -F "file=@test_report.csv" "$N8N_WEBHOOK_URL"
          fi
